version: '3.8'

# ============================================================
# catch_fish Docker Compose 编排
# 启动: docker compose up -d
# 停止: docker compose down
# ============================================================

services:
  # ---- 主应用 ----
  app:
    build: .
    container_name: catch_fish_app
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      - APP_NAME=${APP_NAME:-catch_fish}
      - APP_ENV=${APP_ENV:-production}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - DEEPSEEK_BASE_URL=${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      - DEEPSEEK_MODEL=${DEEPSEEK_MODEL:-deepseek-chat}
      - DATABASE_URL=mysql+pymysql://${MYSQL_USER:-catch_fish}:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE:-catch_fish}
      - DATABASE_URL_ASYNC=mysql+aiomysql://${MYSQL_USER:-catch_fish}:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE:-catch_fish}
      - REDIS_URL=redis://redis:6379/0
      - XIANYU_COOKIE=${XIANYU_COOKIE:-}
      - REQUEST_TIMEOUT=${REQUEST_TIMEOUT:-30}
      - MAX_SEARCH_RESULTS=${MAX_SEARCH_RESULTS:-50}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    volumes:
      - ./logs:/app/logs

  # ---- MySQL 数据库 ----
  mysql:
    image: mysql:8.0
    container_name: catch_fish_mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_dev_password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-catch_fish}
      MYSQL_USER: ${MYSQL_USER:-catch_fish}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-catch_fish_dev}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/01_init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root_dev_password}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---- Redis 缓存 ----
  redis:
    image: redis:7-alpine
    container_name: catch_fish_redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    command: redis-server --appendonly yes ${REDIS_PASSWORD:+--requirepass $REDIS_PASSWORD}

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
